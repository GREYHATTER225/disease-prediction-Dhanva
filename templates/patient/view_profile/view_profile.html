{% extends "basic.html" %}
{% load static %}

{% block head %}
<style>
    :root {
        --patient-bg: #e9f0f4;
        --card-bg: #e9f0f4;
        --accent-green: #ffffff;
        --accent-dark: #dadee2;
        /* Shadows for the depth effect */
        --outer-shadow-dark: #b8c6ca;
        --outer-shadow-light: #ffffff;
        --inner-shadow-dark: #c1ced3;
        --inner-shadow-light: #ffffff;
    }

    body {
        background: linear-gradient(135deg, #ced2d2 0%, #e9f1f2 100%) !important;
        font-family: 'Poppins', sans-serif;
        min-height: 100vh;
        color: var(--accent-dark);
    }

    /* The Main Skeuomorphic Container */
    .patient-popup {
        background: var(--card-bg);
        border-radius: 50px;
        padding: 50px;
        margin-top: 50px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 20px 20px 60px var(--outer-shadow-dark), 
                   -20px -20px 60px var(--outer-shadow-light);
        max-width: 750px;
    }

    .header-title {
        font-weight: 800;
        text-align: center;
        color: var(--accent-dark);
        margin-bottom: 40px;
        font-size: 2rem;
        letter-spacing: -1px;
    }

    /* Inset Input Design */
    .vTextField, .vDateField, input[type="text"] {
        background: var(--card-bg) !important;
        border: none !important;
        border-radius: 20px !important;
        box-shadow: inset 6px 6px 12px var(--inner-shadow-dark), 
                    inset -6px -6px 12px var(--inner-shadow-light) !important;
        padding: 15px 25px !important;
        width: 100%;
        color: #34495e !important;
        font-weight: 600;
        margin-top: 8px;
        transition: 0.3s all;
    }

    .vTextField:focus {
        box-shadow: inset 3px 3px 6px var(--inner-shadow-dark), 
                    inset -3px -3px 6px var(--inner-shadow-light) !important;
    }

    label {
        font-weight: 700;
        font-size: 0.8rem;
        color: #7f8c8d;
        text-transform: uppercase;
        margin-left: 10px;
        letter-spacing: 0.5px;
    }

    /* Buttons with "Pop-out" Depth */
    .btn-patient-edit, .btn-patient-save {
        border: none !important;
        border-radius: 20px !important;
        padding: 15px 40px !important;
        font-weight: 700 !important;
        box-shadow: 8px 8px 16px var(--outer-shadow-dark), 
                    -8px -8px 16px var(--outer-shadow-light) !important;
        background: var(--card-bg) !important;
        color: var(--accent-dark) !important;
        transition: 0.2s;
    }

    .btn-patient-save {
        color: #a6f1fe !important;
    }

    .btn-patient-edit:active, .btn-patient-save:active {
        box-shadow: inset 4px 4px 8px var(--inner-shadow-dark), 
                    inset -4px -4px 8px var(--inner-shadow-light) !important;
        transform: translateY(2px);
    }

    .form-group-custom {
        margin-bottom: 25px;
    }
</style>
{% endblock %}

{% block body %}
<div class="container pb-5">
    <div class="patient-popup mx-auto">
        <h2 class="header-title">Patient Profile</h2>
        
        <div class="row">
            <div class="col-md-6 form-group-custom">
                <label>Username</label>
                <input type="text" id="id_username" value="{{puser.username}}" readonly>
            </div>
            <div class="col-md-6 form-group-custom">
                <label>Full Name</label>
                <input type="text" id="id_name" value="{{puser.patient.name}}">
            </div>
        </div>

        <div class="row">
            <div class="col-md-12 form-group-custom">
                <label>Email Address</label>
                <input type="text" id="id_email" value="{{puser.email}}">
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 form-group-custom">
                <label>Date of Birth</label>
                <input type="text" id="id_dob" value="{{puser.patient.dob|date:'Y-m-d'}}">
            </div>
            <div class="col-md-6 form-group-custom">
                <label>Gender</label>
                <input type="text" id="id_gender" value="{{puser.patient.gender}}">
            </div>
        </div>

        <div class="form-group-custom">
            <label>Residential Address</label>
            <input type="text" id="id_address" value="{{puser.patient.address}}">
        </div>

        <div class="form-group-custom">
            <label>Mobile Contact</label>
            <input type="text" id="id_mobile_no" value="{{puser.patient.mobile_no}}">
        </div>

        {% if request.user.patient %}
        <div class="text-center mt-4">
            <button type="button" class="btn-patient-edit mr-3" data-toggle="collapse" data-target="#saveDiv">Edit Profile</button>
            
            <div id="saveDiv" class="collapse mt-4">
                <button type="button" id="save" class="btn-patient-save">Save Changes</button>
            </div>
        </div>
        {% endif %}
    </div>
</div>

<script>
    $(document).ready(function(){
        $('#save').click(function(event){
            $.ajax({
                url : "#", // Ensure your URL name matches your path here
                type : "POST",
                data : { 
                    'csrfmiddlewaretoken': '{{ csrf_token }}',
                    "name" : $('#id_name').val(),
                    "dob" : $('#id_dob').val(),
                    "gender" : $('#id_gender').val(),
                    "address" : $('#id_address').val(),
                    "mobile_no" : $('#id_mobile_no').val()
                },
                success : function(){
                    alert("Profile updated successfully!");
                }
            });
        });
    });
</script>
{% endblock %}
