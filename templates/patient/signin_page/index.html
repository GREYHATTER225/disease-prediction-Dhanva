<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Login - 🔱Dhanva</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  padding: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  height: 100vh;
}
.login-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: url('/static/signin_page/backgroundlogin.png') center/cover fixed;
  z-index: -1;
}
.login-container {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.glass-card {
  backdrop-filter: blur(25px);
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(100,150,255,0.4);
  border-radius: 24px;
  padding: 3.5rem 3rem;
  max-width: 440px;
  width: 100%;
  max-height: 100vh;
  box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(100,150,255,0.3);
  position: relative;
}
.glass-card::before {
  content: '';
  position: absolute;
  top: -2px;
  left: -2px;
  right: -2px;
  bottom: -3px;
  background: linear-gradient(45deg, rgba(100,150,255,0.3), rgba(200,100,255,0.3), rgba(100,255,200,0.3));
  border-radius: 26px;
  z-index: -1;
  animation: borderGlow 2s linear infinite;
}
@keyframes borderGlow {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}
.title {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  font-size: 1.8rem;
  font-weight: 600;
  text-align: center;
  margin-bottom: 1.5rem;
}
.form-label {
  color: white;
  font-weight: 500;
  font-size: 0.95rem;
  margin-bottom: 0.5rem;
}
.input-field {
  background: transparent;
  border: none;
  border-bottom: 2px solid rgba(255,255,255,0.6);
  color: white;
  padding: 12px 0;
  font-size: 1rem;
  width: 100%;
}
.input-field::placeholder {
  color: rgba(255,255,255,0.6);
}
.input-field:focus {
  outline: none;
  border-bottom-color: #667eea;
}
.forgot {
  color: #dc3545;
  text-decoration: none;
  font-size: 0.85rem;
}
.forgot:hover {
  color: #b02a37;
}
.neumo-login {
  background: rgba(255,255,255,0.15);
  color: white;
  padding: 14px 28px;
  font-weight: 600;
  border-radius: 25px;
  border: none;
  width: 100%;
  font-size: 1.1rem;
  letter-spacing: 0.5px;
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 
    8px 8px 16px rgba(0,0,0,0.25),
    -8px -8px 16px rgba(255,255,255,0.1);
  transition: all 0.3s ease;
  position: relative;
}
.neumo-login:hover {
  box-shadow: 
    inset 2px 2px 4px rgba(0,0,0,0.15),
    inset -2px -2px 4px rgba(255,255,255,0.2);
  transform: translateY(1px);
}
.neumo-login:active {
  transform: scale(0.98);
  transition: transform 0.1s ease;
}

.alert-danger {
  border-radius: 12px;
  border: none;
  background: rgba(220, 53, 69, 0.9);
  color: white;
}
@media (max-width: 480px) {
  .glass-card { margin: 1rem; padding: 1.5rem 1rem; }
  .title { font-size: 1.5rem; }
}
</style>
</head>
<body>
<div class="login-bg"></div>
<div class="login-container">
  <div class="glass-card">
    <form method="POST" action="{% url 'sign_in_patient' %}">
      {% csrf_token %}
      <h2 class="title">Patient Login</h2>
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger mb-3">{{ message }}</div>
        {% endfor %}
      {% endif %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="input-field" type="text" name="username" placeholder="Enter username" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input class="input-field" type="password" name="password" placeholder="Enter password" required>
      </div>
      <div class="mb-4 text-end">
        <a href="#" class="forgot">Forgot password?</a>
      </div>
<button type="submit" class="neumo-login">Login</button>
<div class="text-center mt-3">
        <span class="text-white-50 me-2">Don't have an account?</span> 
        <a href="/accounts/signup_patient" style="color: #60a5fa; font-weight: 500; text-decoration: none;">Sign Up</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
