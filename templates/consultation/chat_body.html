{% load static %}

<div id="msg-list">
{% for obj in chat %}
    {% if obj.sender == request.user %}
    <div class="msg-item message patient">
        <div class="bubble">{{ obj.message }}</div>
        <small class="text-muted mt-1 d-block">{{ obj.created|time:"H:i" }}</small>
    </div>
    {% else %}
    <div class="msg-item message doctor">
        <div class="bubble">{{ obj.message }}</div>
        <small class="text-muted mt-1 d-block">{{ obj.created|time:"H:i" }}</small>
    </div>
    {% endif %}
{% empty %}
    <div class="text-muted text-center py-5">
        <i class="fas fa-comments fa-3x opacity-50 mb-3 d-block"></i>
        <div>No messages yet. Start the conversation!</div>
    </div>
{% endfor %}
</div>
