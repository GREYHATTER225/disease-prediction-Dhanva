{% extends "basic.html" %}
{% load static %}

{% block head %}
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
    :root {
        --bg-color: #f0ede9;
        --light-shadow: #ffffff;
        --dark-shadow: #d1cdc7;
        --text-main: #4a4a4a;
        --accent-pink: #ff6b9d; /* Match the 🔱Dhanva brain icon */
    }

    body {
        background-color: var(--bg-color) !important;
        font-family: 'Poppins', sans-serif;
        color: var(--text-main);
        margin: 0;
        overflow-x: hidden;
    }

    /* The Main Login Card */
    .container-login100 {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
    }

    .wrap-login100 {
        background: var(--bg-color);
        width: 420px;
        padding: 60px 50px;
        border-radius: 60px;
        box-shadow: 25px 25px 50px var(--dark-shadow), 
                    -25px -25px 50px var(--light-shadow);
        text-align: center;
    }

    .login100-form-title {
        font-family: 'Playfair Display', serif;
        font-size: 32px;
        margin-bottom: 40px;
        color: #333;
    }

    /* Input Group Labels */
    .input-group-label {
        text-align: left;
        display: block;
        margin-left: 15px;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 500;
        color: #666;
    }

    /* Inset Soft Inputs */
    .wrap-input100 {
        width: 100%;
        background: var(--bg-color);
        border-radius: 30px;
        box-shadow: inset 6px 6px 10px var(--dark-shadow), 
                    inset -6px -6px 10px var(--light-shadow);
        margin-bottom: 25px;
        padding: 5px 20px;
        border: none;
    }

    .input100 {
        width: 100%;
        height: 50px;
        background: transparent;
        border: none;
        outline: none !important;
        font-size: 15px;
        color: var(--text-main);
    }

    /* "Forgot Password" styling */
    .forgot-link {
        display: block;
        text-align: center;
        margin-top: -10px;
        margin-bottom: 30px;
        font-size: 13px;
        color: #888;
        text-decoration: none;
    }

    /* The 'Sign In' Raised Button */
    .login100-form-btn {
        width: 100%;
        height: 55px;
        background: var(--bg-color);
        border-radius: 30px;
        border: none;
        font-weight: 600;
        letter-spacing: 1px;
        color: #444;
        box-shadow: 6px 6px 12px var(--dark-shadow), 
                    -6px -6px 12px var(--light-shadow);
        cursor: pointer;
        transition: 0.3s;
    }

    .login100-form-btn:hover {
        box-shadow: 3px 3px 6px var(--dark-shadow), 
                    -3px -3px 6px var(--light-shadow);
        transform: translateY(1px);
    }

    .login100-form-btn:active {
        box-shadow: inset 4px 4px 8px var(--dark-shadow), 
                    inset -4px -4px 8px var(--light-shadow);
    }

    /* Create Account Section */
    .signup-text {
        margin-top: 40px;
        font-size: 13px;
        color: #888;
    }

    .signup-btn-small {
        margin-top: 15px;
        display: inline-block;
        padding: 10px 25px;
        background: var(--bg-color);
        border-radius: 20px;
        text-decoration: none;
        font-size: 11px;
        font-weight: 700;
        color: #555;
        box-shadow: 4px 4px 8px var(--dark-shadow), 
                    -4px -4px 8px var(--light-shadow);
    }
</style>
{% endblock %}

{% block body %}

<div class="container-login100">
    <div class="wrap-login100">
        <form action="sign_in_doctor" method="POST">
            {% csrf_token %}

            <h1 class="login100-form-title">Doctor Login</h1>

            <span class="input-group-label">Username</span>
            <div class="wrap-input100">
                <input class="input100" type="text" name="username" placeholder="Enter username" required>
            </div>

            <span class="input-group-label">Password</span>
            <div class="wrap-input100">
                <input class="input100" type="password" name="password" placeholder="Enter password" required>
            </div>

            <a href="#" class="forgot-link">Forgot password?</a>

            {% if messages %}
            <div style="color: #d9534f; font-size: 12px; margin-bottom: 15px;">
                {% for message in messages %}{{ message }}{% endfor %}
            </div>
            {% endif %}

            <button class="login100-form-btn" type="submit">
                SIGN IN
            </button>

            <div class="signup-text">
                New to 🔱Dhanva?<br>
                <a href="signup_doctor" class="signup-btn-small">CREATE ACCOUNT</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
