{% extends "basic.html" %}
{% load static %}

{% block head %}
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; }
    
    body {
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        overflow: hidden;
        height: 100vh;
        background-color: #0f172a; /* Fallback deep navy */
    }

    /* High-Quality Admin Tech Background */
    .admin-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        /* Using a high-quality tech/security abstract image */
        background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), 
                    url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=2070') center/cover no-repeat;
        z-index: -1;
    }

    .admin-container {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
    }

    /* Advanced Glassmorphism Card */
    .glass-card {
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.125);
        border-radius: 24px;
        padding: 3.5rem 3rem;
        max-width: 440px;
        width: 100%;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        position: relative;
    }

    /* Border Glow Effect */
    .glass-card::after {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        border-radius: 24px;
        border: 2px solid transparent;
        background: linear-gradient(135deg, rgba(96, 165, 250, 0.4), rgba(192, 132, 252, 0.4)) border-box;
        -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: destination-out;
        mask-composite: exclude;
        pointer-events: none;
    }

    .title {
        background: linear-gradient(135deg, #60a5fa 0%, #c084fc 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 2rem;
        font-weight: 700;
        text-align: center;
        margin-bottom: 2rem;
        letter-spacing: -0.5px;
    }

    .form-label {
        color: rgba(255, 255, 255, 0.8);
        font-weight: 500;
        font-size: 0.9rem;
        margin-bottom: 0.5rem;
        display: block;
    }

    .input-field {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        color: white;
        padding: 12px 16px;
        font-size: 1rem;
        width: 100%;
        transition: all 0.3s ease;
    }

    .input-field:focus {
        outline: none;
        background: rgba(255, 255, 255, 0.1);
        border-color: #60a5fa;
        box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.2);
    }

    /* Hybrid Neumorphic-Glass Button */
    .auth-btn {
        background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        color: white;
        padding: 14px;
        font-weight: 600;
        border-radius: 12px;
        border: none;
        width: 100%;
        font-size: 1.1rem;
        margin-top: 1rem;
        box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        transition: all 0.3s ease;
        cursor: pointer;
    }

    .auth-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.5);
        filter: brightness(1.1);
    }

    .auth-btn:active {
        transform: scale(0.98);
    }

    .alert-danger {
        border-radius: 12px;
        background: rgba(239, 68, 68, 0.2);
        backdrop-filter: blur(10px);
        color: #fca5a5;
        border: 1px solid rgba(239, 68, 68, 0.3);
        font-size: 0.85rem;
    }

    .avatar-box {
        width: 80px;
        height: 80px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        margin: 0 auto 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.2);
    }
</style>
{% endblock %}

{% block body %}
<div class="admin-bg"></div>

<div class="admin-container">
    <div class="glass-card">
        <div class="avatar-box">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        </div>
        
        <h2 class="title">Admin Portal</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger mb-4 p-3">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form action="{% url 'sign_in_admin' %}" method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label">Admin Username</label>
                <input type="text" name="username" class="input-field" placeholder="Enter admin id" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Master Password</label>
                <input type="password" name="password" class="input-field" placeholder="••••••••" required>
            </div>

            <button type="submit" class="auth-btn">Authorize Access</button>
        </form>

        <div class="text-center mt-4">
            <a href="/" style="color: rgba(255,255,255,0.5); font-size: 0.85rem; text-decoration: none;">&larr; Return to Home</a>
        </div>
    </div>
</div>
{% endblock %}
