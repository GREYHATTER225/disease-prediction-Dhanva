<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - 🔱Dhanva</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  padding: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  height: 100vh;
}
.login-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: url('/static/signin_page/backgroundlogin.png') center/cover fixed;
  z-index: -1;
}
.login-container {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.glass-card {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 16px;
  padding: 2rem 1.5rem;
  max-width: 380px;
  width: 100%;
  max-height: 70vh;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.title {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  font-size: 1.8rem;
  font-weight: 600;
  text-align: center;
  margin-bottom: 1.5rem;
}
.form-label {
  color: white;
  font-weight: 500;
  font-size: 0.95rem;
  margin-bottom: 0.5rem;
}
.input-field {
  background: transparent;
  border: none;
  border-bottom: 2px solid rgba(255,255,255,0.6);
  color: white;
  padding: 12px 0;
  font-size: 1rem;
  width: 100%;
}
.input-field::placeholder {
  color: rgba(255,255,255,0.6);
}
.input-field:focus {
  outline: none;
  border-bottom-color: #667eea;
}
.forgot {
  color: #dc3545;
  text-decoration: none;
  font-size: 0.85rem;
}
.forgot:hover {
  color: #b02a37;
}
.btn-login {
  background: linear-gradient(135deg, #667eea, #764ba2);
  border: none;
  color: white;
  padding: 12px;
  font-weight: 500;
  border-radius: 12px;
  width: 100%;
  font-size: 1rem;
  transition: background 0.3s ease;
  box-shadow: none;
  margin-top: 0.5rem;
}
.btn-login:hover {
  background: linear-gradient(135deg, #5a67d8, #6b46c1);
}
.btn-signup {
  background: linear-gradient(135deg, #48bb78, #38a169);
  border: none;
  color: white;
  padding: 8px 20px;
  font-weight: 500;
  border-radius: 12px;
  text-decoration: none;
  font-size: 0.9rem;
  box-shadow: none;
}
.alert-danger {
  border-radius: 12px;
  border: none;
  background: rgba(220, 53, 69, 0.9);
  color: white;
}
@media (max-width: 480px) {
  .glass-card { margin: 1rem; padding: 1.5rem 1rem; }
  .title { font-size: 1.5rem; }
}
</style>
</head>
<body>
<div class="login-bg"></div>
<div class="login-container">
  <div class="glass-card">
    <form method="POST" action="/accounts/sign_in/">
      {% csrf_token %}
      <h2 class="title">Login</h2>
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger mb-3">{{ message }}</div>
        {% endfor %}
      {% endif %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="input-field" type="text" name="username" placeholder="Enter username" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input class="input-field" type="password" name="password" placeholder="Enter password" required>
      </div>
      <div class="mb-4 text-end">
        <a href="#" class="forgot">Forgot password?</a>
      </div>
      <button type="submit" class="btn-login">Login</button>
      <div class="text-center mt-3 text-white-50">
        Choose Role: <a href="/accounts/sign_in_patient/" class="btn-signup">Patient</a> | <a href="/accounts/sign_in_doctor/" class="btn-signup">Doctor</a> | <a href="/accounts/sign_in_admin/" class="btn-signup">Admin</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
